<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Email Assistant • Real AI</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #f5f7fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: #333;
}
header {
    background: linear-gradient(135deg, #4285F4, #34A853);
    color: white;
    padding: 24px;
    text-align: center;
}
.container {
    max-width: 1100px;
    margin: auto;
    padding: 24px;
}
.card {
    background: white;
    padding: 24px;
    margin-bottom: 24px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}
h2 { margin-bottom: 16px; color: #1a73e8; }
button {
    background: #1a73e8;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
}
button:hover { background: #1557b0; }
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0 16px;
    border: 1px solid #dadce0;
    border-radius: 6px;
    font-size: 15px;
}
textarea { resize: vertical; min-height: 120px; }
.email {
    padding: 14px;
    border-bottom: 1px solid #f1f3f4;
}
.email:hover { background: #f8f9fa; }
#aiAnswer {
    margin-top: 20px;
    padding: 18px;
    background: #f0f7ff;
    border-radius: 8px;
    border-left: 4px solid #1a73e8;
    white-space: pre-wrap;
}
.status-connected { color: #137333; font-weight: 500; }
.warning {
    background: #fff3cd;
    color: #856404;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 14px;
}
</style>
</head>
<body>

<header>
    <h1>AI Email Assistant</h1>
    <p>Real OpenAI • All in One File</p>
</header>

<div class="container">

    <div class="warning">
        ⚠️ <strong>Security Notice:</strong> Your OpenAI API key is embedded in this file. 
        Do not share this file publicly.
    </div>

    <!-- Google Account -->
    <div class="card">
        <h2>Google Account</h2>
        <button onclick="connectGoogle()">Connect Gmail</button>
        <p id="status" style="margin-top:12px;">Not Connected</p>
    </div>

    <!-- Inbox -->
    <div class="card">
        <h2>Inbox</h2>
        <button onclick="loadEmails()">Refresh Inbox</button>
        <div id="emailList" style="margin-top:16px;"></div>
    </div>

    <!-- Ask AI -->
    <div class="card">
        <h2>Ask AI About Your Emails (Powered by OpenAI)</h2>
        <input id="question" placeholder="E.g., What meetings do I have this week?">
        <button onclick="askAI()">Ask Real AI</button>
        <div id="aiAnswer"></div>
    </div>

    <!-- Send Email -->
    <div class="card">
        <h2>Compose &amp; Send Email</h2>
        <input id="to" placeholder="To: recipient@example.com">
        <input id="subject" placeholder="Subject">
        <textarea id="message" placeholder="Write your message..."></textarea>
        <button onclick="sendEmail()">Send Email</button>
    </div>

    <!-- Sent Emails -->
    <div class="card">
        <h2>Sent Emails</h2>
        <div id="sentList"></div>
    </div>

</div>

<script>
// ==================== YOUR OPENAI API KEY ====================
const OPENAI_API_KEY = "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";

// ==================== MOCK EMAILS ====================
let emails = [
    {
        id: 1,
        sender: "boss@company.com",
        subject: "Q3 Planning Meeting",
        preview: "Let's schedule the quarterly planning session for next week.",
        date: "2025-06-10",
        body: "Hi team, we need to finalize the Q3 roadmap. Please let me know your availability next week."
    },
    {
        id: 2,
        sender: "hr@company.com",
        subject: "Welcome to the team!",
        preview: "We're excited to have you on board.",
        date: "2025-06-09",
        body: "Welcome aboard! Here's everything you need to get started in your new role."
    },
    {
        id: 3,
        sender: "newsletter@techcrunch.com",
        subject: "Today's top tech stories",
        preview: "AI breakthroughs, new startup funding, and more...",
        date: "2025-06-11",
        body: "Here are the biggest stories in tech today including new AI models and funding rounds."
    }
];

let sentEmails = [];

// Connect Google (simulated)
function connectGoogle() {
    const status = document.getElementById("status");
    status.innerHTML = "Redirecting to Google...";
    setTimeout(() => {
        status.innerHTML = '<span class="status-connected">✅ Connected as demo@yourcompany.com</span>';
        loadEmails();
    }, 800);
}

// Load emails
function loadEmails() {
    const list = document.getElementById("emailList");
    list.innerHTML = "";

    emails.forEach(email => {
        const div = document.createElement("div");
        div.className = "email";
        div.innerHTML = `
            <strong>${email.sender}</strong><br>
            <strong>${email.subject}</strong><br>
            <small>${email.preview}</small><br>
            <small style="color:#666;">${email.date}</small>
        `;
        list.appendChild(div);
    });
}

// ==================== REAL OPENAI INTEGRATION ====================
async function askAI() {
    const questionInput = document.getElementById("question");
    const question = questionInput.value.trim();
    const answerDiv = document.getElementById("aiAnswer");

    if (!question) {
        answerDiv.innerHTML = "<p style='color:#d93025;'>Please type a question.</p>";
        return;
    }

    answerDiv.innerHTML = "🧠 Thinking with OpenAI...";

    // Create context from all emails
    const emailContext = emails.map(e => 
        `From: ${e.sender}\nSubject: ${e.subject}\nDate: ${e.date}\nContent: ${e.body}`
    ).join("\n\n---\n\n");

    const systemPrompt = `You are a helpful AI email assistant. 
Answer the user's question based ONLY on the emails provided below. 
Be concise and accurate. If the answer is not in the emails, say so politely.`;

    const userPrompt = `Here are the user's recent emails:\n\n${emailContext}\n\nUser's question: ${question}`;

    try {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",           // Fast and cheap model
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userPrompt }
                ],
                max_tokens: 400,
                temperature: 0.3
            })
        });

        const data = await response.json();

        if (data.error) {
            answerDiv.innerHTML = `<p style="color:#d93025;">OpenAI Error: ${data.error.message}</p>`;
            return;
        }

        const answer = data.choices[0].message.content;
        answerDiv.innerHTML = `<strong>AI Answer:</strong><br>${answer}`;

    } catch (error) {
        answerDiv.innerHTML = `<p style="color:#d93025;">Failed to reach OpenAI. Check your internet connection or API key.</p>`;
        console.error(error);
    }
}

// Send email (simulated)
function sendEmail() {
    const to = document.getElementById("to").value.trim();
    const subject = document.getElementById("subject").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!to || !subject) {
        alert("Please fill in 'To' and 'Subject'.");
        return;
    }

    const newSent = {
        to: to,
        subject: subject,
        message: message,
        date: new Date().toISOString().split('T')[0]
    };

    sentEmails.unshift(newSent);

    alert(`✅ Email sent successfully to ${to}!`);

    // Clear form
    document.getElementById("to").value = "";
    document.getElementById("subject").value = "";
    document.getElementById("message").value = "";

    showSentEmails();
}

// Show sent emails
function showSentEmails() {
    const container = document.getElementById("sentList");
    container.innerHTML = "";

    if (sentEmails.length === 0) {
        container.innerHTML = "<p style='color:#666;'>No emails sent yet in this session.</p>";
        return;
    }

    sentEmails.forEach(email => {
        const div = document.createElement("div");
        div.className = "email";
        div.innerHTML = `
            <strong>To: ${email.to}</strong><br>
            <strong>${email.subject}</strong><br>
            <small>\( {email.message.substring(0, 90)} \){email.message.length > 90 ? '...' : ''}</small><br>
            <small style="color:#666;">Sent: ${email.date}</small>
        `;
        container.appendChild(div);
    });
}

// Initialize
function init() {
    loadEmails();
    showSentEmails();
    
    // Auto "connect" for convenience
    setTimeout(() => {
        const status = document.getElementById("status");
        if (!status.innerHTML.includes("Connected")) {
            status.innerHTML = '<span class="status-connected">✅ Demo connected</span>';
        }
    }, 1200);
}

init();
</script>

</body>
</html>
